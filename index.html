<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Affiliate Deals | Shop & Earn</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* minimal base styling for dark theme & responsiveness */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000000;
      color: #ffffff;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      line-height: 1.5;
      padding: 1rem;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .big-buttons {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin: 1.5rem 0;
    }

    .big-btn {
      background: #1f1f1f;
      color: #ffffff;
      text-align: center;
      padding: 1rem;
      border-radius: 1rem;
      text-decoration: none;
      font-weight: bold;
      font-size: 1.2rem;
      transition: 0.2s;
      cursor: pointer;
      display: block;
      border: none;
      width: 100%;
    }

    .big-btn:active {
      background: #2a2a2a;
      transform: scale(0.98);
    }

    .categories-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-top: 1rem;
    }

    .category-card {
      background: #111111;
      border-radius: 1rem;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.1s ease;
    }

    .category-card:active {
      transform: scale(0.97);
    }

    .category-card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      display: block;
      background: #1a1a1a;
    }

    .category-card h3 {
      margin: 0.75rem 0.5rem 0.25rem;
      font-size: 1.2rem;
    }

    .category-card p {
      margin: 0 0.5rem 0.75rem;
      font-size: 0.85rem;
      color: #cccccc;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }

    h2 {
      font-size: 1.5rem;
      margin: 1rem 0 0.5rem;
    }

    @media (min-width: 768px) {
      .big-buttons {
        flex-direction: row;
      }
      .categories-grid {
        gap: 1.5rem;
      }
      body {
        padding: 2rem;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <!-- top section visible without scroll -->
    <section class="hero">
      <h1>⚡ DealBazaar</h1>
      <div class="big-buttons">
        <button class="big-btn" data-url="https://candylink69.vercel.app">🎬 Watch Full Movies & Videos Online</button>
        <button class="big-btn" data-url="https://antarvasana69.vercel.app">📖 Exclusive Hindi Stories</button>
      </div>
    </section>

    <!-- categories grid (2 columns) loaded from categories.json -->
    <section class="categories">
      <h2>🔥 Explore trending categories</h2>
      <div class="categories-grid" id="categoriesGrid">
        <!-- dynamic content will be injected via JavaScript -->
        <div style="grid-column: span 2; text-align: center; padding: 2rem;">Loading categories...</div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
  <script>
    // function to render category cards using data from categories.json
    function renderCategories(categories) {
      const grid = document.getElementById('categoriesGrid');
      if (!grid) return;
      
      if (!categories || categories.length === 0) {
        grid.innerHTML = '<div style="grid-column: span 2; text-align: center;">No categories found.</div>';
        return;
      }

      grid.innerHTML = '';
      categories.forEach(category => {
        const card = document.createElement('div');
        card.className = 'category-card';
        // using real image path from JSON, no emoji as thumbnail
        card.innerHTML = `
          <img src="${category.thumbnail}" alt="${category.title}" loading="lazy" onerror="this.src='https://placehold.co/400x300/222/fff?text=Image+Not+Found'">
          <h3>${escapeHtml(category.title)}</h3>
          <p>${escapeHtml(category.caption)}</p>
        `;
        card.addEventListener('click', (e) => {
          e.stopPropagation();
          window.location.href = `list.html?category=${encodeURIComponent(category.id)}`;
        });
        grid.appendChild(card);
      });
    }

    // simple XSS protection
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
        return c;
      });
    }

    // load categories from categories.json
    function loadCategoriesFromJson() {
      fetch('categories.json')
        .then(response => {
          if (!response.ok) throw new Error('Network response was not ok');
          return response.json();
        })
        .then(data => renderCategories(data))
        .catch(error => {
          console.error('Error loading categories:', error);
          const grid = document.getElementById('categoriesGrid');
          if (grid) {
            grid.innerHTML = '<div style="grid-column: span 2; text-align: center; color: #ff8888;">⚠️ Failed to load categories. Please refresh.</div>';
          }
        });
    }

    // attach external link handlers to big buttons using openExternal (from script.js)
    function attachBigButtonHandlers() {
      const buttons = document.querySelectorAll('.big-btn');
      buttons.forEach(btn => {
        // remove any existing listeners to avoid duplication
        const newBtn = btn.cloneNode(true);
        btn.parentNode.replaceChild(newBtn, btn);
        newBtn.addEventListener('click', (e) => {
          e.preventDefault();
          const url = newBtn.getAttribute('data-url');
          if (url) {
            // use global openExternal from script.js
            if (typeof window.openExternal === 'function') {
              window.openExternal(url);
            } else {
              // fallback in case script.js hasn't loaded (should never happen)
              window.location.href = url;
            }
          }
        });
      });
    }

    // start loading categories once DOM is ready
    document.addEventListener('DOMContentLoaded', () => {
      loadCategoriesFromJson();
      // ensure big buttons use openExternal after script.js is loaded
      if (typeof window.openExternal === 'function') {
        attachBigButtonHandlers();
      } else {
        // wait for script.js to define openExternal
        const checkInterval = setInterval(() => {
          if (typeof window.openExternal === 'function') {
            clearInterval(checkInterval);
            attachBigButtonHandlers();
          }
        }, 50);
        // safety timeout after 2 seconds
        setTimeout(() => {
          clearInterval(checkInterval);
          attachBigButtonHandlers();
        }, 2000);
      }
    });
  </script>
</body>
</html>
